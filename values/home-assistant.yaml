controller:
  type: Deployment

deploymentStrategy: Recreate

ingress:
  external: true

configuration:
  enabled: true
  forceInit: true
  trusted_proxies:
    - "10.0.0.0/8"
  templateConfig: |
    default_config:
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        {{- range .Values.configuration.trusted_proxies }}
        - {{ . }}
        {{- end }}
    sonos:
      media_player:
        hosts:
          - 192.168.1.48
        advertise_addr: 192.168.1.57
    frontend:
      themes: !include_dir_merge_named themes
    automation: !include automations.yaml
    script: !include scripts.yaml
    google_assistant:
      project_id: kieranajp
      service_account: !include SERVICE_ACCOUNT.json
      report_state: true
    scene: !include scenes.yaml

additionalPorts:
  - name: sonos
    containerPort: 1400
    hostPort: 1400
    protocol: TCP

securityContext:
  privileged: true

livenessProbe:
  httpGet: null
  exec:
    command:
      - test
      - -e
      - /dev/ttyUSB0
  periodSeconds: 30
  failureThreshold: 3

additionalVolumes:
  - name: zigbee
    hostPath:
      path: /dev/ttyUSB0
      type: CharDevice
  - name: ha-google-assistant-sa
    secret:
      secretName: ha-google-assistant-sa

additionalMounts:
  - name: zigbee
    mountPath: /dev/ttyUSB0
  - name: ha-google-assistant-sa
    mountPath: /config/SERVICE_ACCOUNT.json
    subPath: SERVICE_ACCOUNT.json
    readOnly: true

persistence:
  enabled: true
  size: 5Gi

initContainers:
  - name: install-custom-components
    image: alpine:latest
    env:
      - name: ZIPS
        value: |
          hacs=https://github.com/hacs/integration/releases/latest/download/hacs.zip
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /config/custom_components
        echo "$ZIPS" | while read -r entry; do
          [ -z "$entry" ] && continue
          name="${entry%%=*}"
          url="${entry#*=}"
          wget -O "/tmp/$name.zip" "$url"
          unzip -o "/tmp/$name.zip" -d "/config/custom_components/$name"
        done
    volumeMounts:
      - name: home-assistant-pvc
        mountPath: /config
