fullnameOverride: plex

image:
  tag: latest
  pullPolicy: Always

pms:
  storageClassName: local-path
  configStorage: 10Gi

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  ingressClassName: traefik
  url: plex.kieranajp.uk
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  tls:
    - hosts:
        - plex.kieranajp.uk

service:
  type: ClusterIP

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

extraEnv:
  TZ: Europe/Berlin
  PLEX_UPDATE_CHANNEL: "5"
  ADVERTISE_IP: "http://192.168.1.57:32400/"
