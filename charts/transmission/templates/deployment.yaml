apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        {{- if .Values.vpn.enabled }}
        {{- include "vpn.container" . | nindent 8 }}
        {{- end }}
        - name: transmission
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- if not .Values.vpn.enabled }}
          ports:
            - name: web
              containerPort: 9091
            - name: peer-tcp
              containerPort: 51413
              protocol: TCP
            - name: peer-udp
              containerPort: 51413
              protocol: UDP
          {{- end }}
          env:
            - name: PUID
              value: "{{ .Values.puid }}"
            - name: PGID
              value: "{{ .Values.pgid }}"
            - name: TZ
              value: "{{ .Values.timezone }}"
            {{- if .Values.auth }}
            - name: USER
              value: "{{ .Values.auth.username }}"
            - name: PASS
              value: "{{ .Values.auth.password }}"
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-config
        - name: downloads
          nfs:
            server: {{ .Values.nfs.server }}
            path: {{ .Values.nfs.downloadsPath | quote }}
        {{- if .Values.vpn.enabled }}
        {{- include "vpn.volumes" . | nindent 8 }}
        {{- end }}
